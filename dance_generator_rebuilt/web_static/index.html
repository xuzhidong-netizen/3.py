<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>舞曲生成器 Web</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="page-shell">
    <aside class="control-panel">
      <div class="panel-head">
        <p class="eyebrow">Dance List Console</p>
        <h1>舞曲生成器</h1>
        <p class="subtle">从本地目录扫描舞曲，编排、检查、导出、保存。页面布局已按“导入、排曲、导出”重排，常用入口集中在顶部。</p>
        <p><a class="home-link" href="../standalone.html">返回主页面</a></p>
        <nav class="quick-links" aria-label="页面导航">
          <a class="quick-link" href="../standalone.html">Standalone</a>
          <a class="quick-link" href="./library.html">舞曲库</a>
          <a class="quick-link" href="./recognizer.html">舞曲识别</a>
        </nav>
      </div>

      <section class="card meta-card">
        <div class="field-grid">
          <label>
            <span>舞曲目录</span>
            <input id="pathInput" type="text" placeholder="/path/to/music">
          </label>
          <label>
            <span>标题</span>
            <input id="titleInput" type="text" placeholder="青春舞会舞曲">
          </label>
          <label>
            <span>排曲人</span>
            <input id="authorInput" type="text" placeholder="冬冬">
          </label>
          <label>
            <span>舞协</span>
            <select id="clubInput"></select>
          </label>
          <label>
            <span>地点</span>
            <select id="placeInput"></select>
          </label>
          <label>
            <span>日期</span>
            <input id="dateInput" type="text" placeholder="2026年03月02日">
          </label>
          <label>
            <span>星期</span>
            <input id="weekdayInput" type="text" placeholder="周一">
          </label>
          <label>
            <span>开始时间</span>
            <input id="timeInput" type="text" placeholder="19:00">
          </label>
        </div>
        <div class="action-sections">
          <section class="action-group">
            <h3>导入与检查</h3>
            <div class="button-row">
              <button class="primary" id="loadBtn">加载目录</button>
              <button id="loadCloudBtn">加载/下载前3首示例</button>
              <button id="loadCloudFullBtn">加载/下载全部示范舞曲</button>
              <button id="syncBtn">更新列表</button>
              <button id="checkBtn">检查排曲</button>
            </div>
          </section>
          <section class="action-group">
            <h3>排曲与导出</h3>
            <div class="button-row">
              <button id="addPartBtn">增加分场</button>
              <button id="deletePartBtn">删除最后分场</button>
              <button id="addSongBtn">增加舞曲</button>
              <button id="exportBtn">生成列表</button>
              <button id="saveCopyBtn">复制保存</button>
              <button id="saveMoveBtn">移动保存</button>
            </div>
          </section>
        </div>
      </section>

      <section class="card stats-card">
        <div class="stat-strip">
          <div>
            <strong id="countStat">0</strong>
            <span>总曲数</span>
          </div>
          <div>
            <strong id="durationStat">00:00</strong>
            <span>总时长</span>
          </div>
        </div>
        <ul class="distribution-list" id="distributionList"></ul>
      </section>

      <section class="card issues-card">
        <div class="section-title">
          <h2>规则检查</h2>
          <span id="issueBadge">0</span>
        </div>
        <div id="issues"></div>
      </section>

      <section class="card log-card">
        <div class="section-title">
          <h2>日志</h2>
        </div>
        <div id="log"></div>
      </section>
    </aside>

    <main class="workspace">
      <section class="hero card">
        <div>
          <p class="eyebrow">Arrangement Board</p>
          <h2>排曲工作台</h2>
        </div>
        <div class="hero-actions">
          <button id="prevBtn">上一首</button>
          <button id="sequencePlayBtn">顺序播放</button>
          <button id="nextBtn">下一首</button>
          <button id="playToggleBtn">播放预览</button>
          <audio id="audioPlayer" controls></audio>
        </div>
      </section>

      <section class="card table-card">
        <div class="section-title">
          <h2>舞曲表</h2>
          <span>拖拽行调整顺序，分场行保留在表格中。</span>
        </div>
        <div class="table-wrap">
          <table id="songsTable">
            <thead>
              <tr>
                <th>序号</th>
                <th>舞曲</th>
                <th>舞种</th>
                <th>点播</th>
                <th>时长</th>
                <th>MD5</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="songsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="preview-grid">
        <section class="card preview-card">
          <div class="section-title">
            <h2>导出预览</h2>
            <span id="previewCaption">还没有生成 PNG</span>
          </div>
          <img id="previewImage" alt="song list preview">
        </section>
        <section class="card files-card">
          <div class="section-title">
            <h2>输出文件</h2>
          </div>
          <ul id="exportedFiles"></ul>
        </section>
      </section>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
